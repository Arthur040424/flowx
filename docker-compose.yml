services:
  postgres:
    image: postgres:16-alpine
    container_name: flowx-postgres
    environment:
      POSTGRES_USER: flowx
      POSTGRES_PASSWORD: flowx_dev_password
      POSTGRES_DB: flowx
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
